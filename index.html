<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanchez Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #32ff00;
            --neon-cyan: #39ff14;
            --neon-pink: #000000;
            --text-color: #bc13fe;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0a0a0a 100%);
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 243, 255, 0.05);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5), 0 0 20px rgba(0, 243, 255, 0.2);
            letter-spacing: 2px;
        }

        p.welcome {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            color: #b0b0b0;
        }

        .links-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .links-list li a {
            display: block;
            padding: 1rem 2rem;
            text-decoration: none;
            color: var(--text-color);
            border: 1px solid var(--neon-pink);
            border-radius: 10px;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .links-list li a:hover {
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4), inset 0 0 5px rgba(255, 0, 255, 0.2);
            transform: translateY(-3px);
            color: #fff;
        }

        .links-list li a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }

        .links-list li a:hover::before {
            left: 100%;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
        }

        .glow-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-cyan);
            filter: blur(150px);
            opacity: 0.1;
            border-radius: 50%;
            pointer-events: none;
        }

        .glow-1 { top: 10%; left: 10%; }
        .glow-2 { bottom: 10%; right: 10%; background: var(--neon-pink); }

    </style>
</head>
<body>
    <div class="background-glow"></div>
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="container">
        <h1>Sanchez Workspace</h1>
        <p class="welcome">
            Välkommen till din personliga kommandocentral. Härifrån hanterar vi framtiden, en kodrad i taget.
        </p>
        
        <ul class="links-list">
            <li><a href="https://github.com/xmdltz" target="_blank" rel="noopener noreferrer">GitHub</a></li>
            <li><a href="#" target="_blank" rel="noopener noreferrer">Jules AI</a></li>
            <li><a href="#" target="_blank" rel="noopener noreferrer">Jules AI</a></li>
            <li><a href="#" target="_blank" rel="noopener noreferrer">Jules AI</a></li>
        </ul>

        <footer>
            &copy; 2025 Sanchez Workspace. System online.
        </footer>
    </div>
</body>
</html>
